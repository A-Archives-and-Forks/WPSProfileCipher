name: Build and release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  VCPKG_COMMIT: cd61e1e26a038e82d6550a3ebbe0fbbfe7da78e3

jobs:
  build:
    name: ${{ matrix.platform }}-${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            platform: windows
            architecture: x86
            triplet: x86-windows-static-mt
            msvc_architecture: x86
            package_extension: zip
          - runner: windows-2025
            platform: windows
            architecture: x64
            triplet: x64-windows-static-mt
            msvc_architecture: x64
            package_extension: zip
          - runner: windows-11-arm
            platform: windows
            architecture: arm64
            triplet: arm64-windows-static-mt
            msvc_architecture: arm64
            package_extension: zip
          - runner: ubuntu-24.04
            platform: linux
            architecture: x64
            triplet: x64-linux
            package_extension: tar.gz
          - runner: ubuntu-24.04-arm
            platform: linux
            architecture: arm64
            triplet: arm64-linux
            package_extension: tar.gz
          - runner: macos-15-intel
            platform: macos
            architecture: x64
            triplet: x64-osx-static
            package_extension: tar.gz
          - runner: macos-15
            platform: macos
            architecture: arm64
            triplet: arm64-osx-static
            package_extension: tar.gz

    runs-on: ${{ matrix.runner }}
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      PACKAGE_NAME: wps-profile-cipher-${{ matrix.platform }}-${{ matrix.architecture }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Check out vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.VCPKG_COMMIT }}
          path: vcpkg

      - name: Bootstrap vcpkg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./vcpkg/bootstrap-vcpkg.bat -disableMetrics

      - name: Bootstrap vcpkg on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Initialize MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_architecture }}

      - name: Configure
        shell: bash
        run: >-
          cmake -S . -B build/ci -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_OVERLAY_TRIPLETS="$GITHUB_WORKSPACE/cmake/triplets"
          -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}"
          -DWPS_PROFILE_CIPHER_WARNINGS_AS_ERRORS=ON
          -DCPACK_PACKAGE_FILE_NAME="$PACKAGE_NAME"

      - name: Build
        run: cmake --build build/ci --parallel

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure

      - name: Package
        run: cmake --build build/ci --target package

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: |
            build/ci/${{ env.PACKAGE_NAME }}.${{ matrix.package_extension }}
            build/ci/${{ env.PACKAGE_NAME }}.${{ matrix.package_extension }}.sha256
          if-no-files-found: error

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: dist/*
